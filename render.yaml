services:
  # Backend Service
  - type: web
    name: intelli-credit-backend
    runtime: docker
    dockerContext: backend
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: intelli-credit-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PORT
        value: 8000

databases:
  # Managed PostgreSQL Database
  - name: intelli-credit-db
    plan: free
    databaseName: intellicredit
    user: hasish
